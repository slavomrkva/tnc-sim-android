# Builds an installable debug APK on every push to a work branch and on
# manual dispatch, and publishes it as a workflow artifact for device testing.
# Debug-signed only — Play releases keep the manual signed flow in NOTES.md.
name: Android debug APK

on:
  push:
    branches:
      - main
      - 'claude/**'
      - 'feature/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets into the native project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --console=plain

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tnc-sim-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
