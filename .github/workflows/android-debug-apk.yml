# Validates JavaScript source on pull requests and main without building an APK.
name: Android checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Android test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out event revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        shell: bash
        run: git ls-files -z -- '*.js' '*.mjs' | xargs -0 -n 1 node --check

      - name: Run regression tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' test_files < <(find tests -maxdepth 1 -type f \( -name '*.test.js' -o -name '*.test.mjs' \) -print0 | sort -z)
          if ((${#test_files[@]} == 0)); then
            echo "No regression tests found." >&2
            exit 1
          fi
          for test_file in "${test_files[@]}"; do
            node "$test_file"
          done
