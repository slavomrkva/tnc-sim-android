# Validates pull requests and main, builds an installable debug APK, and
# publishes it as a workflow artifact for device testing.
# Debug-signed only — Play releases keep the manual signed flow in NOTES.md.
name: Android debug APK

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-debug-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Android test and debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out event revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        shell: bash
        run: git ls-files -z -- '*.js' '*.mjs' | xargs -0 -n 1 node --check

      - name: Run regression tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' test_files < <(find tests -maxdepth 1 -type f \( -name '*.test.js' -o -name '*.test.mjs' \) -print0 | sort -z)
          if ((${#test_files[@]} == 0)); then
            echo "No regression tests found." >&2
            exit 1
          fi
          for test_file in "${test_files[@]}"; do
            node "$test_file"
          done

      - name: Sync web assets into the native project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --console=plain

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tnc-sim-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
